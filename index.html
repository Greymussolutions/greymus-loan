<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greymus Loan Internal Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        .container {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
            margin: auto;
        }
        h2, h3 { text-align: center; color: #007bff; margin-top: 0; }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background-color: #0056b3; }
        .hidden { display: none !important; }
        
        /* Stats Grid Dashboard */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #252525;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            border-bottom: 3px solid #007bff;
        }
        .stat-card.danger { border-bottom-color: #dc3545; }
        .stat-card.success { border-bottom-color: #28a745; }
        .stat-num { font-size: 18px; font-weight: bold; margin-top: 5px; }

        .loan-card {
            background: #2a2a2a;
            padding: 15px;
            margin: 10px 0;
            border-radius: 6px;
            border-left: 5px solid #ffc107;
            font-size: 14px;
            line-height: 1.5;
        }
        .loan-card.Approved { border-left-color: #28a745; }
        .loan-card.Rejected { border-left-color: #dc3545; }
        .loan-card.Arrears { border-left-color: #e83e8c; background: #341e24; }
        
        .actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn-approve { background-color: #28a745; }
        .btn-reject { background-color: #dc3545; }
        .role-selector { margin-bottom: 15px; text-align: center; }
        .badge { display: inline-block; padding: 3px 7px; border-radius: 4px; font-size: 11px; font-weight: bold; background: #444; }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. SECURE LOGIN SCREEN -->
        <div id="login-section">
            <h2>Greymus Systems Portal</h2>
            <div class="role-selector">
                <label><input type="radio" name="login-role" value="officer" checked> Loan Officer</label>
                <label style="margin-left: 15px;"><input type="radio" name="login-role" value="admin"> Administrator</label>
            </div>
            <input type="email" id="email" placeholder="Corporate Email Address" required>
            <input type="password" id="password" placeholder="Access Password" required>
            <button id="login-btn">Secure Connection</button>
        </div>

        <!-- 2. OFFICER BOARD -->
        <div id="officer-section" class="hidden">
            <h2>Officer Performance Board</h2>
            
            <!-- Metrics Metrics Section -->
            <div class="stats-grid">
                <div class="stat-card"><div class="label">Active Portfolio</div><div class="stat-num" id="off-portfolio">KES 0</div></div>
                <div class="stat-card success"><div class="label">Earned Income</div><div class="stat-num" id="off-income">KES 0</div></div>
                <div class="stat-card danger"><div class="label">Arrears / Overdue</div><div class="stat-num" id="off-arrears">0 Files</div></div>
                <div class="stat-card"><div class="label">Your Profile</div><div class="stat-num" id="off-name" style="font-size:12px; word-break: break-all;">...</div></div>
            </div>

            <h3>Submit New Loan File</h3>
            <input type="text" id="client-name" placeholder="Client Full Name">
            <input type="tel" id="client-phone" placeholder="Client Mobile Number (e.g. 07...)">
            <input type="number" id="loan-amount" placeholder="Principal Amount (KES)">
            <input type="number" id="loan-interest" placeholder="Interest Rate % (e.g. 10)">
            <input type="number" id="loan-duration" placeholder="Duration (Months)">
            <input type="number" id="client-credit" placeholder="CRB Credit Score (e.g. 300 - 850)">
            <input type="date" id="loan-duedate" placeholder="First Due Date">
            
            <button id="submit-loan-btn">Dispatch File for Review</button>
            <button id="officer-logout" style="background-color: #555; margin-top: 15px;">Logout</button>
        </div>

        <!-- 3. ADMIN MASTER BOARD -->
        <div id="admin-section" class="hidden">
            <h2>Admin Master Panel</h2>
            <h3>Global Pipeline Review</h3>
            <div id="all-loans-list">Processing secure pipeline records...</div>
            <button id="admin-logout" style="background-color: #555; margin-top: 20px;">Logout</button>
        </div>
    </div>

    <!-- FIREBASE PLATFORM INJECTIONS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIGURE YOUR FIREBASE APP INSTANCE HERE:
        const firebaseConfig = {
  apiKey: "AIzaSyDt9iW5woMIRP1E-eMTHdYpgceQZxK8wrE",
  authDomain: "greymus-loan.firebaseapp.com",
  projectId: "greymus-loan",
  storageBucket: "greymus-loan.firebasestorage.app",
  messagingSenderId: "689969179781",
  appId: "1:689969179781:web:aca0247196d31dcd68cdec"};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentRole = 'officer';

        // Gateway Authentication Engine
        document.getElementById('login-btn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            currentRole = document.querySelector('input[name="login-role"]:checked').value;
            
            signInWithEmailAndPassword(auth, email, password)
                .then(() => {
                    document.getElementById('login-section').classList.add('hidden');
                    if(currentRole === 'admin') {
                        document.getElementById('admin-section').classList.remove('hidden');
                        loadSystemData(true);
                    } else {
                        document.getElementById('officer-section').classList.remove('hidden');
                        document.getElementById('off-name').innerText = email;
                        loadSystemData(false);
                    }
                })
                .catch((err) => alert("Authentication Refused: " + err.message));
        });

        // Pipeline Dispatch Handling
        document.getElementById('submit-loan-btn').addEventListener('click', async () => {
            const name = document.getElementById('client-name').value;
            const phone = document.getElementById('client-phone').value;
            const amount = parseFloat(document.getElementById('loan-amount').value);
            const interest = parseFloat(document.getElementById('loan-interest').value || 0);
            const duration = document.getElementById('loan-duration').value;
            const credit = document.getElementById('client-credit').value || "N/A";
            const due = document.getElementById('loan-duedate').value;

            if(!name || !amount || !due) return alert("Validation Failed: Check Name, Amount, and Due Date.");

            try {
                await addDoc(collection(db, "loans"), {
                    clientName: name,
                    clientPhone: phone,
                    amount: amount,
                    interestRate: interest,
                    duration: duration,
                    creditScore: credit,
                    dueDate: due,
                    status: "Pending",
                    submittedBy: auth.currentUser.email,
                    timestamp: new Date().toISOString()
                });
                alert("File written into database ledger successfully!");
                
                // Reset inputs
                ['client-name','client-phone','loan-amount','loan-interest','loan-duration','client-credit','loan-duedate'].forEach(id => {
                    document.getElementById(id).value = '';
                });
                loadSystemData(false);
            } catch(e) { alert("Write Error: " + e.message); }
        });

        // Combined Live Operational Data Aggregator
        async function loadSystemData(isAdminView) {
            const adminContainer = document.getElementById('all-loans-list');
            if(isAdminView) adminContainer.innerHTML = "";
            
            let totalPortfolio = 0;
            let totalIncome = 0;
            let totalArrearsCount = 0;
            const todayStr = new Date().toISOString().split('T')[0];

            try {
                const querySnapshot = await getDocs(collection(db, "loans"));
                
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const isOwner = data.submittedBy === auth.currentUser.email;
                    
                    // Determine Arrears Status
                    let calculatedStatus = data.status;
                    if(data.status === "Approved" && data.dueDate && data.dueDate < todayStr) {
                        calculatedStatus = "Arrears";
                    }

                    // Calculate Running totals specifically for the logged-in officer
                    if(!isAdminView && isOwner) {
                        if(data.status === "Approved" || calculatedStatus === "Arrears") {
                            totalPortfolio += data.amount;
                            totalIncome += (data.amount * (data.interestRate / 100));
                        }
                        if(calculatedStatus === "Arrears") {
                            totalArrearsCount++;
                        }
                    }

                    // Render out the row data if Admin view is toggled
                    if(isAdminView) {
                        const card = document.createElement('div');
                        card.className = `loan-card ${calculatedStatus}`;
                        card.innerHTML = `
                            <strong>Client:</strong> ${data.clientName} <span class="badge">Credit: ${data.creditScore}</span><br>
                            <strong>Amount:</strong> KES ${data.amount} [${data.duration} Mo. @ ${data.interestRate}%]<br>
                            <strong>Target Due Date:</strong> ${data.dueDate}<br>
                            <strong>Officer Assigned:</strong> ${data.submittedBy}<br>
                            <strong>Status Label:</strong> <b style="text-transform:uppercase;">${calculatedStatus}</b>
                        `;

                        if(data.status === "Pending") {
                            const actions = document.createElement('div');
                            actions.className = "actions";
                            
                            const appBtn = document.createElement('button');
                            appBtn.className = "btn-approve"; appBtn.innerText = "Approve";
                            appBtn.onclick = async () => { await updateDoc(doc(db, "loans", docSnap.id), {status: "Approved"}); loadSystemData(true); };

                            const rejBtn = document.createElement('button');
                            rejBtn.className = "btn-reject"; rejBtn.innerText = "Reject";
                            rejBtn.onclick = async () => { await updateDoc(doc(db, "loans", docSnap.id), {status: "Rejected"}); loadSystemData(true); };

                            actions.appendChild(appBtn); actions.appendChild(rejBtn);
                            card.appendChild(actions);
                        }
                        adminContainer.appendChild(card);
                    }
                });

                // Set up visual counters for individual Officer Performance metrics
                if(!isAdminView) {
                    document.getElementById('off-portfolio').innerText = "KES " + totalPortfolio.toLocaleString();
                    document.getElementById('off-income').innerText = "KES " + totalIncome.toLocaleString();
                    document.getElementById('off-arrears').innerText = totalArrearsCount + " Files";
                } else if(querySnapshot.empty) {
                    adminContainer.innerHTML = "<p>No files are logged in database yet.</p>";
                }
            } catch(e) { if(isAdminView) adminContainer.innerHTML = "Ledger Sync Error: " + e.message; }
        }

        // System Logouts
        const terminateSession = () => { signOut(auth).then(() => location.reload()); };
        document.getElementById('officer-logout').addEventListener('click', terminateSession);
        document.getElementById('admin-logout').addEventListener('click', terminateSession);
    </script>
</body>
        </html>
